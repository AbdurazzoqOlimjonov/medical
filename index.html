<!doctype html>
<html lang="uz">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MediClinic Pro - Bemorni Qabul Qilish Tizimi</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="toast-container" id="toastContainer"></div>

		<div class="modal" id="emailModal">
			<div class="modal-content">
				<h3>📧 Emailga Yuborish</h3>
				<input type="email" id="emailInput" placeholder="Bemor emaili..." />
				<div class="modal-buttons">
					<button class="btn-confirm" onclick="sendEmail()">Yuborish</button>
					<button class="btn-cancel" onclick="closeEmailModal()">Bekor</button>
				</div>
			</div>
		</div>

		<div class="container">
			<div class="header">
				<div class="header-content">
					<h1>🏥 MediClinic Pro</h1>
					<p>Zamonaviy tibbiy qabul va bemorni ro'yxatga olish tizimi</p>
				</div>
			</div>

			<div class="main-grid">
				<div class="form-section">
					<h2>Bemorni Ro'yxatga Olish</h2>
					<form id="patientForm">
						<div class="form-group required">
							<label for="firstName">To'liq Ismi</label>
							<input type="text" id="firstName" placeholder="Ali Abdullayev" />
							<div class="error-message" id="firstNameError"></div>
						</div>

						<div class="form-group required">
							<label for="dob">Tug'ilgan Sanasi</label>
							<input type="date" id="dob" />
							<div class="error-message" id="dobError"></div>
						</div>

						<div class="form-group required">
							<label for="phone">Telefon Raqami</label>
							<input type="tel" id="phone" placeholder="+998 (XX) XXX-XX-XX" />
							<div class="error-message" id="phoneError"></div>
						</div>

						<div class="form-group required">
							<label for="visitReason">Ki'rish Sababi</label>
							<select id="visitReason">
								<option value="">-- Tanlang --</option>
								<option value="consultation">🔍 Konsultatsiya</option>
								<option value="checkup">🩺 Tibbiy Tekshirish</option>
								<option value="treatment">💊 Davolash</option>
								<option value="surgery">🏥 Jarrohlik</option>
								<option value="emergency">🚨 Shoshqoqlik</option>
							</select>
							<div class="error-message" id="visitReasonError"></div>
						</div>

						<div class="form-group required">
							<label for="specialty">Mutaxassislik</label>
							<select id="specialty">
								<option value="">-- Tanlang --</option>
								<option value="cardiology">❤️ Kardiologiya</option>
								<option value="orthopedics">🦴 Ortopediya</option>
								<option value="neurology">🧠 Nevrologiya</option>
								<option value="dermatology">🔬 Dermatologiya</option>
								<option value="pediatrics">👶 Bolalar Kasalliklari</option>
								<option value="ophthalmology">👁️ Oftalmologiya</option>
								<option value="dentistry">🦷 Stomatologiya</option>
							</select>
							<div class="error-message" id="specialtyError"></div>
						</div>

						<div class="form-group required">
							<label for="doctor">Doktor Tanlash</label>
							<select id="doctor">
								<option value="">-- Mutaxassislikni birinchi tanlang --</option>
							</select>
							<div class="error-message" id="doctorError"></div>
						</div>

						<div class="form-group">
							<label for="symptoms">Asosiy Shikoyatlar (Ixtiyoriy)</label>
							<textarea id="symptoms" placeholder="Bemorning shikoyatlarini yozing..."></textarea>
						</div>

						<button type="button" class="btn" id="submitBtn" onclick="registerPatient()">✓ Ro'yxatga Olish va Chek Olish</button>
					</form>
				</div>

				<div class="patient-display">
					<h2>Bemor Ma'lumoti</h2>
					<div id="patientInfo">
						<div class="empty-state">👈 Forma orqali ma'lumot kiriting</div>
					</div>
				</div>
			</div>

			<div class="receipt-section" id="receiptSection">
				<h2>📋 Tibbiy Chek</h2>
				<div class="receipt" id="receiptContent"></div>
				<div class="receipt-buttons">
					<button class="receipt-btn receipt-btn-print" onclick="printReceipt()">🖨️ Chap Qilish</button>
					<button class="receipt-btn receipt-btn-download" onclick="downloadReceipt()">⬇️ Saqlash</button>
					<button class="receipt-btn receipt-btn-email" onclick="openEmailModal()">📧 Email</button>
					<button class="receipt-btn receipt-btn-new" onclick="newPatient()">➕ Yangi</button>
				</div>
			</div>
		</div>

		<script src="run.js"></script>
	</body>
</html>
